# PleaseFix — Docker Compose IS the production topology (docs/DESIGN.md §8).
# Dev and prod share this shape; TLS/domains differ via Caddyfile + .env.
#
#   cp .env.example .env
#   docker compose up --build
#   → app on http://localhost:8000 (or via Caddy on :80)

services:
  db:
    image: postgis/postgis:18-3.6
    environment:
      POSTGRES_DB: pleasefix
      POSTGRES_USER: pleasefix
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pleasefix}
    ports:
      - "127.0.0.1:5432:5432"  # for non-Docker local dev (uv run manage.py ...)
    volumes:
      # Postgres 18+ images keep data in major-version-specific dirs
      # under /var/lib/postgresql (not .../data) — mounting the old path
      # is an error. A pgdata volume initialized by an older major won't
      # boot on a newer one either. Dev data is throwaway: recreate with
      #   docker compose down && docker volume rm pleasefix_pgdata
      # then re-run manage.py seed_sample_data. Production: pg_dump/restore.
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pleasefix"]
      interval: 5s
      retries: 10
    logging: &logging
      options: { max-size: "10m", max-file: "3" }  # full disk from logs is how single-server deployments die

  redis:
    image: redis:7-alpine
    logging: *logging

  app:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgis://pleasefix:${POSTGRES_PASSWORD:-pleasefix}@db:5432/pleasefix
      REDIS_URL: redis://redis:6379/0
      # The app sits behind Caddy here, so the real client IP is the last
      # X-Forwarded-For hop (core/abuse.py). In production, stop publishing
      # port 8000 below so the app is reachable ONLY through Caddy.
      TRUSTED_PROXY_COUNT: "1"
    command: sh -c "python manage.py migrate && gunicorn config.wsgi --bind 0.0.0.0:8000 --workers 3"
    ports:
      - "8000:8000"
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_started }
    logging: *logging

  worker:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgis://pleasefix:${POSTGRES_PASSWORD:-pleasefix}@db:5432/pleasefix
      REDIS_URL: redis://redis:6379/0
    command: celery -A config worker --loglevel info
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_started }
    logging: *logging

  # S3-compatible object storage; posix backend = photos are plain files
  # under the volume — rsync/restic-able, recoverable without the gateway.
  # Swappable for MinIO/Garage/real S3 by changing this one service + env.
  s3:
    image: versity/versitygw:latest
    command: posix /data
    environment:
      ROOT_ACCESS_KEY: ${S3_ACCESS_KEY:-pleasefix}
      ROOT_SECRET_KEY: ${S3_SECRET_KEY:-pleasefix-dev-secret}
    volumes:
      - s3data:/data
    logging: *logging

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
    depends_on:
      - app
    logging: *logging

volumes:
  pgdata:
  s3data:
  caddydata:
